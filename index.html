<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>KAP — myApps Portal</title>
<style>
:root{--bg:#f0f2f5;--surface:#fff;--surface2:#f8f9fb;--border:#e2e5ea;--border2:#c9cdd4;--text:#1e2329;--text2:#4a5568;--text3:#94a3b8;--accent:#2a9aa0;--accent2:#1e7a7f;--accent-light:#e0f5f5;--red:#dc2626;--green:#16a34a;--green-bg:#f0fdf4;--purple:#7c3aed;--mono:'SF Mono','Cascadia Mono','Consolas',monospace;--sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;--radius:12px;--shadow:0 2px 12px rgba(0,0,0,.08)}
*{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh}
.notification{position:fixed;top:-60px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;padding:10px 24px;border-radius:8px;font-size:14px;font-weight:600;z-index:10000;transition:top .3s;white-space:nowrap}
.notification.show{top:18px}
.notification.error{background:var(--red)}
#loginPage{display:flex;align-items:center;justify-content:center;min-height:100vh;background:#f0f0f0}
.login-card{background:var(--surface);border:1px solid var(--border2);border-radius:16px;padding:48px 40px;width:360px;box-shadow:var(--shadow);animation:loginFadeIn .4s ease-out}
@keyframes loginFadeIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
.form-group{margin-bottom:20px}
label{display:block;font-size:12px;font-weight:600;color:#000;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
input,select,textarea{width:100%;background:#fffbea;border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;color:var(--text);font-family:var(--sans);font-size:14px;outline:none;transition:border-color .2s}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:var(--radius);font-family:var(--sans);font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all .2s ease}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:var(--accent2)}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border2)!important}.btn-secondary:hover{border-color:var(--accent)}
.btn-danger{background:var(--red);color:#fff}
.btn-full{width:100%;justify-content:center;padding:12px}
.error-msg{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);color:#dc2626;font-size:13px;padding:10px 14px;border-radius:8px;margin-bottom:16px;display:none}
.input-error{border:2px solid #dc2626!important;background:rgba(239,68,68,.05)!important}
#portalPage{display:none;min-height:100vh;background:var(--bg)}
.portal-topbar{background:#fff;border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:100}
.portal-topbar .brand{display:flex;align-items:center;gap:10px}.portal-topbar .brand img{width:36px;height:36px;border-radius:8px}.portal-topbar .brand h2{font-size:16px;font-weight:800;color:var(--text)}.portal-topbar .brand span{font-size:11px;color:var(--text3);font-weight:500}
.portal-topbar .spacer{flex:1}
.portal-topbar .user-pill{display:flex;align-items:center;gap:8px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 14px 5px 6px;cursor:pointer;transition:background .2s}.portal-topbar .user-pill:hover{background:var(--accent-light)}
.portal-topbar .user-avatar{width:28px;height:28px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800}
.portal-topbar .user-name{font-size:13px;font-weight:600;color:var(--text)}.portal-topbar .user-role{font-size:10px;color:var(--text3);font-weight:500}
.portal-body{max-width:960px;margin:0 auto;padding:32px 20px}.portal-welcome{margin-bottom:20px}.portal-welcome h1{font-size:clamp(22px,5vw,30px);font-weight:900;color:var(--text);margin-bottom:4px}.portal-welcome p{font-size:14px;color:var(--text3)}
.portal-tabs{display:flex;gap:4px;margin-bottom:20px;border-bottom:2px solid var(--border);padding-bottom:0}
.portal-tab{padding:10px 20px;font-size:14px;font-weight:700;color:var(--text3);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .2s}.portal-tab:hover{color:var(--text2)}.portal-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.app-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;margin-bottom:40px}
.app-card{background:#fff;border:2px solid var(--border);border-radius:16px;padding:24px 20px;text-align:center;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}.app-card:hover{border-color:var(--accent);box-shadow:0 4px 20px rgba(42,154,160,.12);transform:translateY(-2px)}.app-card.disabled{opacity:.4;cursor:not-allowed;pointer-events:none}
.app-card .app-icon{font-size:40px;margin-bottom:10px;display:block}.app-card .app-label{font-size:16px;font-weight:800;color:var(--text);margin-bottom:2px}.app-card .app-full{font-size:11px;color:var(--text3);line-height:1.3}
.app-card .app-badge{position:absolute;top:8px;right:8px;font-size:9px;font-weight:700;padding:2px 8px;border-radius:6px;text-transform:uppercase}.app-badge.active{background:var(--green-bg);color:var(--green)}.app-badge.coming{background:#fff7ed;color:#c2410c}
.users-section{display:none}
.toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.toolbar input[type=text]{padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;outline:none;min-width:180px;background:#fff}.toolbar input:focus{border-color:var(--accent)}
.badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;background:var(--accent-light);color:var(--accent)}.badge-blue{background:rgba(42,154,160,.12);color:var(--accent)}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.04)}
th{text-align:left;padding:10px 14px;font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;background:var(--surface2);border-bottom:2px solid var(--border)}
td{padding:10px 14px;font-size:13px;border-bottom:1px solid #f1f5f9;vertical-align:middle}
tr.clickable-row{cursor:pointer;transition:background .15s}tr.clickable-row:hover{background:rgba(42,154,160,.03)}
.action-btn{background:none;border:none;cursor:pointer;font-size:14px;padding:3px 6px;border-radius:4px;transition:background .15s}.action-btn:hover{background:var(--surface2)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;align-items:center;justify-content:center;z-index:5000;padding:16px}.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:16px;box-shadow:0 16px 48px rgba(0,0,0,.18);width:100%;max-width:520px;max-height:90vh;overflow-y:auto}
.modal-header{display:flex;justify-content:space-between;align-items:center;padding:18px 22px 12px;position:sticky;top:0;background:#fff;z-index:1;border-bottom:1px solid var(--border)}.modal-title{font-size:18px;font-weight:800}.modal-close{font-size:24px;cursor:pointer;color:var(--text3);width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:8px}.modal-close:hover{background:var(--surface2)}
.modal-body{padding:16px 22px}
.form-row{display:flex;gap:12px}.form-row>.form-group{flex:1}
.modal-footer{padding:14px 22px;display:flex;justify-content:flex-end;gap:8px;border-top:1px solid var(--border);position:sticky;bottom:0;background:#fff;flex-wrap:wrap}
.modal-err{width:100%;font-size:12px;font-weight:600;color:var(--red);display:none;margin-bottom:6px}
.user-dropdown{position:absolute;top:52px;right:20px;background:#fff;border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow);padding:8px;min-width:200px;display:none;z-index:200}.user-dropdown.show{display:block}
.user-dropdown .dd-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;color:var(--text);transition:background .15s}.user-dropdown .dd-item:hover{background:var(--surface2)}.user-dropdown .dd-item.danger{color:var(--red)}.user-dropdown .dd-divider{height:1px;background:var(--border);margin:4px 0}
@media(max-width:600px){.portal-body{padding:20px 14px}.app-grid{grid-template-columns:repeat(2,1fr);gap:12px}.app-card{padding:18px 12px}.app-card .app-icon{font-size:32px}.login-card{width:calc(100vw - 32px);padding:32px 24px;margin:16px}.form-row{flex-direction:column;gap:0}}
</style>
</head>

<script async src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<script>
function togglePassVis(){
  const el=document.getElementById('loginPass');
  const btn=document.getElementById('passToggle');
  if(el.type==='password'){el.type='text';btn.textContent='🙈';}
  else{el.type='password';btn.textContent='👁';}
}
function resetToSeed(){
  if(!confirm('This will erase ALL data (localStorage + Supabase) and restore factory defaults. Continue?')) return;
  try{
    DB_TABLES.forEach(tbl=>localStorage.removeItem(LS_PREFIX+tbl));
    ['kap_db_local','kap_rm_user','kap_rm_pass'].forEach(k=>localStorage.removeItem(k));
    sessionStorage.clear();
  }catch(e){}
  // Clear Supabase tables too (async, fire and forget then reload)
  if(_sbReady && _sb){
    (async()=>{
      try{

    })();

}

// ── Math CAPTCHA + Lockout ─────────────────────────────────────────────────
let _captchaAnswer=0;
let _loginFailCount=0;
let _lockoutUntil=0;
let _lockoutInterval=null;
const _LOCKOUT_MAX=3;
const _LOCKOUT_SECS=60;

function _refreshCaptcha(){
  const ops=['+','-','×'];
  const op=ops[Math.floor(Math.random()*3)];
  let a,b,ans;
  if(op==='+'){a=Math.floor(Math.random()*20)+1;b=Math.floor(Math.random()*20)+1;ans=a+b;}
  else if(op==='-'){a=Math.floor(Math.random()*20)+5;b=Math.floor(Math.random()*a)+1;ans=a-b;}
  else{a=Math.floor(Math.random()*9)+2;b=Math.floor(Math.random()*9)+2;ans=a*b;}
  _captchaAnswer=ans;
  const qEl=document.getElementById('captchaQ');
  if(qEl) qEl.textContent=`${a} ${op} ${b}`;
  const aEl=document.getElementById('captchaAns');
  if(aEl){aEl.value='';aEl.classList.remove('input-error');}
  const eEl=document.getElementById('captchaErr');
  if(eEl) eEl.style.display='none';
}

function _startLockout(){
  _lockoutUntil=Date.now()+_LOCKOUT_SECS*1000;
  const banner=document.getElementById('lockoutBanner');
  const btn=document.getElementById('loginBtn');
  if(banner) banner.style.display='block';
  if(btn){btn.disabled=true;btn.style.opacity='.4';btn.style.cursor='not-allowed';}
  _lockoutInterval=setInterval(()=>{
    const rem=Math.max(0,Math.ceil((_lockoutUntil-Date.now())/1000));
    const timer=document.getElementById('lockoutTimer');
    if(timer) timer.textContent=rem;
    if(rem<=0){
      clearInterval(_lockoutInterval);_lockoutInterval=null;
      _loginFailCount=0;
      if(banner) banner.style.display='none';
      if(btn){btn.disabled=false;btn.style.opacity='';btn.style.cursor='';}
      _refreshCaptcha();
    }
  },1000);
}

function _isLockedOut(){ return Date.now()<_lockoutUntil; }

// Init captcha on page load
document.addEventListener('DOMContentLoaded',()=>_refreshCaptcha());

function doLogin(){
  // Check lockout
  if(_isLockedOut()){
    document.getElementById('loginError').style.display='block';
    document.getElementById('loginError').textContent='Account locked. Please wait for the timer to expire.';
    return;
  }
  const u=document.getElementById('loginUser').value.toLowerCase().trim();
  const p=document.getElementById('loginPass').value;
  // Validate CAPTCHA first
  const userAns=parseInt(document.getElementById('captchaAns').value,10);
  if(isNaN(userAns)||userAns!==_captchaAnswer){
    document.getElementById('captchaErr').style.display='block';
    document.getElementById('captchaAns').classList.add('input-error');
    _refreshCaptcha();
    return;
  }
  document.getElementById('captchaErr').style.display='none';
  document.getElementById('captchaAns').classList.remove('input-error');
  console.log('[doLogin] u='+JSON.stringify(u)+' DB.users count='+(DB.users||[]).length);
  const user=DB.users.find(x=>x&&x.name.toLowerCase()===u&&x.password===p);
  if(!user){
    console.warn('[doLogin] no match — DB has',DB.users?.length,'users');
    _loginFailCount++;
    if(_loginFailCount>=_LOCKOUT_MAX){
      _startLockout();
      document.getElementById('loginError').style.display='block';
      document.getElementById('loginError').textContent='Too many failed attempts. Locked for '+_LOCKOUT_SECS+' seconds.';
    } else {
      document.getElementById('loginError').style.display='block';
      document.getElementById('loginError').textContent='Invalid credentials ('+(_LOCKOUT_MAX-_loginFailCount)+' attempt'+((_LOCKOUT_MAX-_loginFailCount)!==1?'s':'')+' remaining)';
    }
    _refreshCaptcha();
    return;
  }
  if(user.inactive===true){
    document.getElementById('loginError').style.display='block';
    document.getElementById('loginError').textContent='This account has been deactivated. Contact your Admin.';
    _refreshCaptcha();
    return;
  }
  // Success — reset fail count
  _loginFailCount=0;
  CU=user; _enrichCU();
  // Always store in sessionStorage so refresh keeps user logged in
  _sessionSet('kap_session_user',u);
  _sessionSet('kap_session_pass',p);
  // Always persist login to localStorage so re-opening the app doesn't require re-login
  try{ localStorage.setItem('kap_rm_user', u); localStorage.setItem('kap_rm_pass', p); }catch(e){}
  document.getElementById('loginError').style.display='none';
  document.getElementById('loginPage').style.display='none';
  showPortal();
}

// ── Save user ───────────────────────────────────────────────────────────────
async function puSaveUser(){
  const id=document.getElementById('muId').value;
  const name=document.getElementById('muName').value.trim().toLowerCase().replace(/[\s!@#$%^&*()+=\[\]{};':"\\|,.<>\/?]/g,'');
  const pass=document.getElementById('muPass').value;
  const plant=document.getElementById('muLoc').value;
  const fullName=document.getElementById('muFull').value.trim();
  const mobile=document.getElementById('muMobile').value;
  const apps=[...document.querySelectorAll('.muAppCb:checked')].map(i=>i.value);
  const roles=[...document.querySelectorAll('.muVmsCb:checked')].map(i=>i.value);
  const hwmsRoles=[...document.querySelectorAll('.muHwmsCb:checked')].map(i=>i.value);
  const inactive=document.getElementById('muInactive')?.checked===true;
  if(!name||!pass){modalErr('mUser','Username and password required');return}
  if(!plant){modalErr('mUser','Location required');return}
  if(!fullName){modalErr('mUser','Full name required');return}
  if(!apps.length){modalErr('mUser','Select at least one app');return}
  if(apps.includes('vms')&&!roles.length){modalErr('mUser','Select at least one VMS role');return}
  if(apps.includes('hwms')&&!hwmsRoles.length){modalErr('mUser','Select at least one HWMS role');return}
  if(roles.includes('KAP Security')&&roles.length>1){modalErr('mUser','KAP Security cannot combine with other roles');return}
  if(mobile&&mobile.length!==10){modalErr('mUser','Mobile must be 10 digits');return}
  // Guard last Super Admin
  const eu=id?byId(DB.users,id):null;
  if(eu?.roles?.includes('Super Admin')&&!roles.includes('Super Admin')){
    if(DB.users.filter(u=>u.id!==id&&u.roles.includes('Super Admin')).length===0){modalErr('mUser','Cannot remove last Super Admin');return}
  }
  // Duplicate checks
  if(DB.users.find(u=>u&&u.name===name&&u.id!==id&&!u.inactive)){modalErr('mUser','Username already exists');return}
  if(DB.users.find(u=>(u.fullName||'').trim().toLowerCase()===fullName.toLowerCase()&&u.id!==id&&!u.inactive)){modalErr('mUser','Full name already exists');return}
  if(id){
    const bak={...eu};Object.assign(eu,{name,password:pass,plant,fullName,mobile,roles,hwmsRoles,apps,inactive});
    if(!await _dbSave('users',eu)){Object.assign(eu,bak);return}
  } else {
    const nu={id:'u'+uid(),name,password:pass,plant,fullName,mobile,roles,hwmsRoles,apps,inactive,photo:'',email:''};
    if(!await _dbSave('users',nu)) return;
  }
  cm('mUser');
  // Sync CU if editing own record
  if(CU&&(id===CU.id||(!id&&DB.users[DB.users.length-1]?.name===name))){
    const fresh=DB.users.find(u=>u.name===name);
    if(fresh) Object.assign(CU,fresh);
  }
  renderPortalUsers();notify('User saved!');
}

// ── Delete user ─────────────────────────────────────────────────────────────
async function puDeleteUser(id){
  const u=byId(DB.users,id);if(!u) return;
  if(u.roles?.includes('Super Admin')&&DB.users.filter(x=>x.id!==id&&x.roles.includes('Super Admin')).length===0){notify('Cannot delete last Super Admin',true);return}
  // Check references
  const refs=[];
  (DB.locations||[]).forEach(l=>{if(l.kapSec===id||(l.tripBook||[]).includes(id)||(l.matRecv||[]).includes(id)||(l.approvers||[]).includes(id)) refs.push('Location: '+l.name)});
  (DB.trips||[]).forEach(t=>{if(t.bookedBy===id) refs.push('Trip: '+t.id)});
  if(refs.length){notify('Cannot delete — referenced by: '+refs.slice(0,3).join(', ')+(refs.length>3?' + '+(refs.length-3)+' more':''),true);return}
  if(!confirm('Delete user "'+u.fullName+'"?')) return;
  if(!await _dbDel('users',id)) return;
  renderPortalUsers();notify('User deleted');
}

// ── Reset password ──────────────────────────────────────────────────────────
async function puResetPwd(id){
  const u=byId(DB.users,id);if(!u) return;
  if(!confirm('Reset password for "'+u.fullName+'" to Kappl@123?')) return;
  const bak={...u};u.password='Kappl@123';
  if(!await _dbSave('users',u)){Object.assign(u,bak);return}
  renderPortalUsers();notify('Password reset to Kappl@123');
}

// ── Profile ─────────────────────────────────────────────────────────────────
function ppLoadProfile(){
  if(!CU) return;
  const initials=(CU.fullName||CU.name).split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();
  const av=document.getElementById('ppAvatar');
  if(CU.photo){av.innerHTML=`<img src="${CU.photo}" style="width:100%;height:100%;object-fit:cover">`;document.getElementById('ppPhotoClearBtn').style.display='block';}
  else{av.textContent=initials;av.style.backgroundImage='';document.getElementById('ppPhotoClearBtn').style.display='none';}
  document.getElementById('ppName').textContent=CU.fullName||CU.name;
  document.getElementById('ppRole').textContent=[...(CU.roles||[]),...(CU.hwmsRoles||[])].join(', ');
  document.getElementById('ppUser').textContent='@'+CU.name;
  document.getElementById('ppFullName').value=CU.fullName||'';
  document.getElementById('ppUsername').value=CU.name||'';
  document.getElementById('ppMobile').value=CU.mobile||'';
  document.getElementById('ppEmail').value=CU.email||'';
  // Reset password section
  document.getElementById('ppPassSection').style.display='none';
  document.getElementById('ppPassIcon').style.transform='rotate(0deg)';
  document.getElementById('ppOldPass').value='';
  document.getElementById('ppNewPass').value='';
  document.getElementById('ppConfPass').value='';
  _ppMsg('ppInfoMsg','',true);_ppMsg('ppPassMsg','',true);
}
function _ppMsg(elId,msg,ok){
  const el=document.getElementById(elId);if(!el)return;
  if(!msg){el.style.display='none';return;}
  el.textContent=msg;el.style.display='block';
  el.style.color=ok?'#4ade80':'#f87171';
  el.style.background=ok?'rgba(74,222,128,.08)':'rgba(248,113,113,.08)';
  el.style.border=ok?'1px solid rgba(74,222,128,.2)':'1px solid rgba(248,113,113,.2)';
  if(ok) setTimeout(()=>{el.style.display='none';},3000);
}
async function ppSaveProfile(){
  if(!CU) return;
  const fullName=(document.getElementById('ppFullName').value||'').trim();
  const mobile=(document.getElementById('ppMobile').value||'').trim();
  const email=(document.getElementById('ppEmail').value||'').trim();
  if(!fullName){_ppMsg('ppInfoMsg','Full name is required',false);return;}
  if(mobile&&mobile.length!==10){_ppMsg('ppInfoMsg','Mobile must be 10 digits',false);return;}
  const dbUser=byId(DB.users,CU.id);
  if(dbUser){
    const bak={...dbUser};
    Object.assign(dbUser,{fullName,mobile,email,photo:CU.photo||''});
    if(!await _dbSave('users',dbUser)){Object.assign(dbUser,bak);return;}
  }
  CU.fullName=fullName;CU.mobile=mobile;CU.email=email;
  document.getElementById('ppName').textContent=fullName;
  // Update topbar
  document.getElementById('portalUserName').textContent=fullName;
  const initials=fullName.split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();
  document.getElementById('portalAvatar').textContent=CU.photo?'':initials;
  _ppMsg('ppInfoMsg','Profile saved!',true);
}
function ppTogglePass(){
  const s=document.getElementById('ppPassSection');
  const ic=document.getElementById('ppPassIcon');
  const open=s.style.display==='none';
  s.style.display=open?'block':'none';
  if(ic)ic.style.transform=open?'rotate(180deg)':'rotate(0deg)';
}
async function ppSavePass(){
  if(!CU) return;
  const oldPass=document.getElementById('ppOldPass').value||'';
  const newPass=document.getElementById('ppNewPass').value||'';
  const confPass=document.getElementById('ppConfPass').value||'';
  if(!oldPass||!newPass||!confPass){_ppMsg('ppPassMsg','Fill all password fields',false);return;}
  if(oldPass!==CU.password){_ppMsg('ppPassMsg','Current password is incorrect',false);return;}
  const pwdErrs=_pwdErrors(newPass);
  if(pwdErrs.length){_ppMsg('ppPassMsg','Password requires: '+pwdErrs.join(', '),false);return;}
  if(newPass!==confPass){_ppMsg('ppPassMsg','New passwords do not match',false);return;}
  const dbUser=byId(DB.users,CU.id);
  if(dbUser){const bak={...dbUser};dbUser.password=newPass;if(!await _dbSave('users',dbUser)){dbUser.password=bak.password;return;}}
  CU.password=newPass;
  try{if(localStorage.getItem('kap_rm_pass'))localStorage.setItem('kap_rm_pass',newPass);}catch(e){}
  try{if(sessionStorage.getItem('kap_session_pass'))sessionStorage.setItem('kap_session_pass',newPass);}catch(e){}
  document.getElementById('ppOldPass').value='';document.getElementById('ppNewPass').value='';document.getElementById('ppConfPass').value='';
  _ppMsg('ppPassMsg','Password updated!',true);
}
function ppOnPhoto(input){
  if(!input.files||!input.files[0])return;
  const file=input.files[0];
  const reader=new FileReader();
  reader.onload=ev=>{
    CU.photo=ev.target.result;
    ppLoadProfile(); // refresh avatar immediately
    compressImage(file).then(async c=>{
      CU.photo=c;
      const dbUser=byId(DB.users,CU.id);
      if(dbUser){dbUser.photo=c;await _dbSave('users',dbUser);}
      ppLoadProfile();
    }).catch(()=>{});
  };
  reader.readAsDataURL(file);input.value='';
}
async function ppClearPhoto(){
  if(!CU)return;
  CU.photo='';
  const dbUser=byId(DB.users,CU.id);
  if(dbUser){dbUser.photo='';await _dbSave('users',dbUser);}
  ppLoadProfile();
}

document.addEventListener('click',e=>{if(!e.target.closest('.user-pill')&&!e.target.closest('.user-dropdown'))document.getElementById('userDropdown').classList.remove('show')});

// ── Logout ──────────────────────────────────────────────────────────────────
function doLogout(){
  CU=null;_sessionDel('kap_session_user');_sessionDel('kap_session_pass');
  try{localStorage.removeItem('kap_rm_user');localStorage.removeItem('kap_rm_pass')}catch(e){}
  document.getElementById('loginPage').style.display='flex';
  document.getElementById('loginUser').value='';document.getElementById('loginPass').value='';
  document.getElementById('loginError').textContent='';document.getElementById('loginBtn').disabled=false;document.getElementById('loginBtn').textContent='Sign In';

// ── Boot ────────────────────────────────────────────────────────────────────
// IMMEDIATE: check session before anything else (no waiting for window.load)
(function(){
  // Fast redirect if session exists
  var su,sp2;
  try{ su=sessionStorage.getItem('kap_session_user'); sp2=sessionStorage.getItem('kap_session_pass'); }catch(e){}
  if(su&&sp2){ window.location.href='myApps_VMS_v18.html'; return; }
  // Check localStorage remember-me
  var lu=null,lp2=null;
  try{ lu=localStorage.getItem('kap_rm_user'); lp2=localStorage.getItem('kap_rm_pass'); }catch(e){}
  if(lu&&lp2){
    try{ sessionStorage.setItem('kap_session_user',lu); sessionStorage.setItem('kap_session_pass',lp2); }catch(e){}
    window.location.href='myApps_VMS_v18.html'; return;
  }
  // No session — show login page NOW
  document.getElementById('loginPage').style.display='flex';
})();

// ASYNC: connect to DB after page loads
async function _portalBoot(){
  var overlayMsg=document.getElementById('loginOverlayMsg');

  // Wait for Supabase CDN
  var sbLib=!!(window.supabase||window.Supabase);
  if(!sbLib){
    for(var w=0;w<16;w++){
      await new Promise(function(r){setTimeout(r,500)});
      sbLib=!!(window.supabase||window.Supabase);
      if(overlayMsg) overlayMsg.textContent='Connecting to database'+'.'.repeat((w%3)+1);
      if(sbLib) break;
    }
  }

  if(!_sbReady) _initSupabase();
  if(!_sbReady){
    if(overlayMsg) overlayMsg.textContent='Trying fallback…';
    _sbTryFallbackCDN();
    for(var f=0;f<10&&!_sbReady;f++){
      await new Promise(function(r){setTimeout(r,500)});
      _initSupabase();
    }
  }

  if(overlayMsg) overlayMsg.textContent=_sbReady?'Loading data…':'Loading offline…';
  try{ await bootDB(); }catch(e){ console.error('Portal bootDB error:',e); }

  // Show login form (hide overlay)
  var overlay=document.getElementById('loginOverlay');
  var form=document.getElementById('loginForm');
  if(overlay) overlay.style.display='none';
  if(form) form.style.display='block';
  var uField=document.getElementById('loginUser');
  if(uField) uField.focus();
}

window.addEventListener('load', function(){
  _portalBoot().catch(function(e){
    console.error('Portal boot failed:',e);
    var o=document.getElementById('loginOverlay');if(o)o.style.display='none';
    var f=document.getElementById('loginForm');if(f)f.style.display='block';
  });
});
</script>
